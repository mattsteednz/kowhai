name: audiovault
description: AudioVault Audiobook Player.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.0.0
  shared_preferences: ^2.3.2
  path: ^1.9.1
  audio_metadata_reader: ^1.4.2
  permission_handler: ^11.0.0
  just_audio: ^0.9.0
  audio_service: ^0.18.0
  path_provider: ^2.1.0
  sqflite: ^2.3.0
  http: ^1.2.0
  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
