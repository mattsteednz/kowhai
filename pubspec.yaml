name: audiovault
description: AudioVault Audiobook Player.
publish_to: 'none'
version: 1.2.1+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.0
  shared_preferences: ^2.3.2
  path: ^1.9.1
  audio_metadata_reader: ^1.4.2
  permission_handler: ^12.0.1
  just_audio: ^0.10.0
  audio_service: ^0.18.0
  path_provider: ^2.1.0
  sqflite: ^2.3.0
  http: ^1.2.0
  firebase_core: ^4.0.0
  firebase_analytics: ^12.0.0
  firebase_crashlytics: ^5.0.0
  flutter_chrome_cast: ^1.4.4
  get_it: ^9.2.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.4
  build_runner: ^2.13.1
  sqflite_common_ffi: ^2.4.0+2

# path_provider_android 2.3.x depends on jni/jni_flutter which require NDK to
# compile libdartjni.so. Without NDK configured, the .so is absent from the APK
# and the app crashes at runtime. Pin to the last pre-JNI version until we set
# up NDK or path_provider_android drops the JNI dependency.
dependency_overrides:
  path_provider_android: 2.2.23

flutter:
  uses-material-design: true
